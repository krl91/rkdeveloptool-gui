  <text x="578" y="143" font-family="Arial, Helvetica, sans-serif" font-size="29" fill="#222222">
    <tspan x="578" dy="0">Press and hold the flash button, then</tspan>
    <tspan x="578" dy="37">connect DC power. After 2 seconds,</tspan>
    <tspan x="578" dy="37">release the button - the RX will enter</tspan>
    <tspan x="578" dy="37">flashing mode. At this point, connect</tspan>
    <tspan x="578" dy="37">the RX to a computer via Type-C, and</tspan>
    <tspan x="578" dy="37">begin the flashing process...</tspan>
