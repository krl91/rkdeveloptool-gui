name: Linux Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to update when running manually, for example v0.1.2"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            libfuse2t64 \
            libusb-1.0-0-dev \
            pkg-config

      - name: Build standalone rkdeveloptool
        run: |
          autoreconf -i
          ./configure --enable-standalone
          make -j"$(nproc)"
          ./rkdeveloptool -v

      - name: Install GUI dependencies
        working-directory: gui
        run: npm ci

      - name: Run GUI checks
        working-directory: gui
        run: |
          npm run check
          npm test

      - name: Build Linux AppImage
        working-directory: gui
        run: npm run dist:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rk-firmware-updater-linux
          path: |
            gui/dist/*.AppImage
            gui/dist/*.AppImage.blockmap
          if-no-files-found: error

      - name: Upload AppImage to GitHub release
        if: ${{ startsWith(github.ref, 'refs/tags/') || inputs.tag_name != '' }}
        working-directory: gui
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "RK Firmware Updater ${RELEASE_TAG#v}" \
              --notes "Linux AppImage release."
          fi
          gh release upload "$RELEASE_TAG" dist/*.AppImage dist/*.AppImage.blockmap \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
