name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  gui-test:
    name: make gui-test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            libusb-1.0-0-dev \
            pkg-config

      - name: Configure build system
        run: |
          autoreconf -i
          ./configure

      - name: Run C++ unit tests
        run: make check

      - name: Run GUI automatic tests
        run: make gui-test
