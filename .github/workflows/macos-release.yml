name: macOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-signed-dmg:
    name: Build signed and notarized DMG
    runs-on: macos-latest

    env:
      CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Validate signing and notarization secrets
        run: |
          missing=0
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY_ID APPLE_API_ISSUER APPLE_API_KEY_BASE64; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for signed macOS releases"
              missing=1
            fi
          done
          exit "$missing"

      - name: Prepare Apple API key
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          key_path="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          KEY_PATH="$key_path" python3 -c 'import base64, os, pathlib; pathlib.Path(os.environ["KEY_PATH"]).write_bytes(base64.b64decode(os.environ["APPLE_API_KEY_BASE64"]))'
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: brew install automake autoconf libusb pkg-config

      - name: Build rkdeveloptool
        run: |
          autoreconf -i
          ./configure --enable-standalone
          make -j"$(sysctl -n hw.ncpu)"

      - name: Install GUI dependencies
        working-directory: gui
        run: npm ci

      - name: Build signed and notarized macOS package
        working-directory: gui
        run: npm run dist:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rk-firmware-updater-macos
          path: |
            gui/dist/*.dmg
            gui/dist/*.dmg.blockmap
          if-no-files-found: error
