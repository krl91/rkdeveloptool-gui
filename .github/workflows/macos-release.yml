name: macOS Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to update when running manually, for example v0.1.0"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-dmg:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Detect signing and notarization secrets
        id: signing
        env:
          MACOS_CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          MACOS_CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          missing_names=""
          for name in MACOS_CSC_LINK MACOS_CSC_KEY_PASSWORD APPLE_API_KEY_ID APPLE_API_ISSUER APPLE_API_KEY_BASE64; do
            if [ -z "${!name}" ]; then
              missing_names="$missing_names $name"
            fi
          done
          if [ -n "$missing_names" ]; then
            echo "::warning::Apple signing/notarization secrets are missing:$missing_names. Building an ad hoc signed DMG."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Apple API key
        if: steps.signing.outputs.available == 'true'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          key_path="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          KEY_PATH="$key_path" python3 -c 'import base64, os, pathlib; pathlib.Path(os.environ["KEY_PATH"]).write_bytes(base64.b64decode(os.environ["APPLE_API_KEY_BASE64"]))'
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: brew install automake autoconf libusb pkg-config

      - name: Build rkdeveloptool
        run: |
          autoreconf -i
          ./configure --enable-standalone
          make -j"$(sysctl -n hw.ncpu)"

      - name: Install GUI dependencies
        working-directory: gui
        run: npm ci

      - name: Build signed and notarized macOS package
        if: steps.signing.outputs.available == 'true'
        working-directory: gui
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npm run dist:mac

      - name: Build ad hoc signed macOS package
        if: steps.signing.outputs.available != 'true'
        working-directory: gui
        run: npm run dist:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rk-firmware-updater-macos
          path: |
            gui/dist/*.dmg
            gui/dist/*.dmg.blockmap
          if-no-files-found: error

      - name: Upload DMG to GitHub release
        if: ${{ startsWith(github.ref, 'refs/tags/') || inputs.tag_name != '' }}
        working-directory: gui
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
          SIGNING_AVAILABLE: ${{ steps.signing.outputs.available }}
        run: |
          if [ "$SIGNING_AVAILABLE" = "true" ]; then
            release_notes="Signed and notarized macOS release."
          else
            release_notes="Ad hoc signed macOS release. macOS may show a security warning on first launch."
          fi
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "RK Firmware Updater ${RELEASE_TAG#v}" \
              --notes "$release_notes"
          fi
          gh release upload "$RELEASE_TAG" dist/*.dmg dist/*.dmg.blockmap \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
