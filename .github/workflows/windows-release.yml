name: Windows Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to update when running manually, for example v0.1.2"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-installer:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Set up MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            wget
            autoconf
            automake
            make
            pkgconf
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-libusb

      - name: Build standalone rkdeveloptool.exe
        shell: msys2 {0}
        run: |
          autoreconf -i
          ./configure --enable-standalone
          make -j"$(nproc)"
          ./rkdeveloptool.exe -v

      - name: Install GUI dependencies
        working-directory: gui
        run: npm ci

      - name: Run GUI checks
        working-directory: gui
        run: |
          npm run check
          npm test

      - name: Build Windows installer
        working-directory: gui
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rk-firmware-updater-windows
          path: |
            gui/dist/*.exe
            gui/dist/*.exe.blockmap
          if-no-files-found: error

      - name: Upload Windows installer to GitHub release
        if: ${{ startsWith(github.ref, 'refs/tags/') || inputs.tag_name != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
        shell: pwsh
        run: |
          $assets = @()
          $assets += Get-ChildItem -Path "gui/dist" -Filter "*.exe" | ForEach-Object { $_.FullName }
          $assets += Get-ChildItem -Path "gui/dist" -Filter "*.exe.blockmap" | ForEach-Object { $_.FullName }
          if ($assets.Count -eq 0) {
            throw "No Windows installer assets found in gui/dist"
          }

          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG `
              --repo $env:GITHUB_REPOSITORY `
              --title "RK Firmware Updater $($env:RELEASE_TAG.TrimStart('v'))" `
              --notes "Windows installer release."
          }

          gh release upload $env:RELEASE_TAG @assets `
            --repo $env:GITHUB_REPOSITORY `
            --clobber
